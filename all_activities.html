<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Activities</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
font-family:Arial,sans-serif;
background:#f7f9fc;
margin:0;
padding:0;
}

.page-wrapper{
max-width:900px;
margin:0 auto;
padding:1rem;
}

.page-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:1.5rem;
}

.section-title{
font-size:1.4rem;
font-weight:600;
margin:0;
color:#333;
}

.back-link{
font-size:.95rem;
color:#0078ff;
text-decoration:none;
font-weight:600;
}

.back-link:hover{
text-decoration:underline;
color:#005fcc;
}

.activities-list{
display:flex;
flex-direction:column;
gap:14px;
}

.activity-card{
background:#fff;
border:1px solid #ddd;
padding:14px;
border-radius:10px;
box-shadow:0 1px 5px rgba(0,0,0,.06);
transition:background .2s;
}

.activity-card:hover{
background:#f1f4f9;
}

.card-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
}

.activity-header-left{
display:flex;
align-items:center;
gap:10px;
}

.activity-icon{
font-size:1.4rem;
color:#0078ff;
}

.activity-title{
font-weight:600;
font-size:1.1rem;
}

.activity-date{
font-size:.85rem;
color:#666;
}

.no-activity-message{
color:#666;
text-align:center;
padding:20px;
}
</style>
</head>

<body>

<div id="navbar-container"></div>

<div class="page-wrapper">

<div class="page-header">
<h2 class="section-title"><i class="fa-solid fa-list-check"></i> All Activities</h2>
<a href="daily_activites.html" class="back-link">&laquo; Back</a>
</div>

<div id="allActivitiesList" class="activities-list"></div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
